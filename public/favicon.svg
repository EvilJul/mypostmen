<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="arrow" x1="140" y1="160" x2="380" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="sparkle-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle inner shadow -->
  <rect width="512" height="512" rx="112" fill="none" stroke="white" stroke-opacity="0.12" stroke-width="2"/>

  <!-- Send arrow (paper plane shape) -->
  <g filter="url(#glow)">
    <path
      d="M148 168 L364 256 L148 344 L188 272 L308 256 L188 240 Z"
      fill="url(#arrow)"
      opacity="0.95"
    />
  </g>

  <!-- AI sparkle - top right -->
  <g filter="url(#sparkle-glow)">
    <!-- Main 4-point star -->
    <path d="M380 120 L386 140 L406 146 L386 152 L380 172 L374 152 L354 146 L374 140 Z"
          fill="white" opacity="0.95"/>
    <!-- Small star -->
    <path d="M340 100 L343 108 L351 111 L343 114 L340 122 L337 114 L329 111 L337 108 Z"
          fill="white" opacity="0.7"/>
    <!-- Tiny dot -->
    <circle cx="408" cy="118" r="4" fill="white" opacity="0.5"/>
  </g>
</svg>
